<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Design Commenter — 데모</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; color: #18181b; background: #fafafa; }
    header { background: #312e81; color: #fff; padding: 28px 24px; }
    header h1 { margin: 0 0 6px; font-size: 22px; }
    header p { margin: 0; opacity: .85; font-size: 14px; }
    main { max-width: 760px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h2 { margin: 0 0 8px; font-size: 17px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { border: 0; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn.primary { background: #6366f1; color: #fff; }
    .btn.ghost { background: #f4f4f5; color: #3f3f46; }
    .pill { display: inline-block; background: #eef2ff; color: #4338ca; border-radius: 999px; padding: 4px 12px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tile { background: #f4f4f5; border-radius: 10px; padding: 16px; text-align: center; }
    footer { text-align: center; color: #a1a1aa; font-size: 12px; padding: 24px; }
    ol { line-height: 1.7; }
  </style>
</head>
<body>
  <header>
    <h1>Design Commenter 데모 페이지</h1>
    <p>우측 하단 패널에서 <strong>편집 모드</strong>를 켜고 아무 요소나 클릭해 코멘트를 남겨보세요.</p>
  </header>
  <main>
    <div class="card">
      <span class="pill">사용법</span>
      <h2>3단계로 끝</h2>
      <ol>
        <li><strong>편집 모드</strong> 버튼을 켭니다 (요소 위로 마우스를 올리면 하이라이트).</li>
        <li>고치고 싶은 요소를 <strong>클릭</strong>하고 수정 요청을 적은 뒤 저장.</li>
        <li>다 끝나면 <strong>📋 Claude Code로 복사</strong> → 터미널에 붙여넣기.</li>
      </ol>
    </div>

    <div class="card">
      <h2>버튼 예시</h2>
      <div class="row">
        <button class="btn primary">기본 버튼</button>
        <button class="btn ghost">보조 버튼</button>
        <button class="btn primary" id="cta">CTA 버튼</button>
      </div>
    </div>

    <div class="card">
      <h2>그리드 예시</h2>
      <div class="grid">
        <div class="tile">카드 1</div>
        <div class="tile">카드 2</div>
        <div class="tile">카드 3</div>
      </div>
    </div>
  </main>
  <footer>© Design Commenter — 독립 실행형 비주얼 피드백 도구</footer>

  <script src="design-commenter.js"></script>
</body>
</html>
