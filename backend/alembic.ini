# Alembic configuration for the Stock backend.
#
# The database URL is NOT set here on purpose: env.py reads it from
# models.database.DATABASE_URL (driven by the DATABASE_URL env var), so a
# single source of truth governs both the app and migrations.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Template used to generate migration file names; include a date for ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; prepend the backend dir so `models` imports.
prepend_sys_path = .

# Timezone for file_template timestamps (blank = local naive).
# timezone =

# Max length of the slug field in file_template.
truncate_slug_length = 40

[post_write_hooks]
# No autoformatting hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
