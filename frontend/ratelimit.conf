# Rate-limit zones — must live at http{} scope.
# Copied by the Dockerfile to /etc/nginx/conf.d/00-ratelimit.conf, which
# nginx includes inside its stock http{} block (and the "00-" prefix loads
# it before default.conf so the zones exist when location blocks use them).
#
# Single-user app, so limits are generous; they exist mainly to blunt
# brute-force on login and runaway clients.
#
#   login : 5 requests/minute  per IP  (brute-force protection on /api/auth/login)
#   api   : 20 requests/second per IP  (general API ceiling)
#
# Burst + nodelay is set per-location in default.conf.

limit_req_zone $binary_remote_addr zone=login:1m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Return 429 (Too Many Requests) instead of the nginx default 503.
limit_req_status 429;
