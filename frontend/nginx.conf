server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS — enable once TLS is live end-to-end. With Cloudflare terminating
    # TLS at the edge (origin stays http), HSTS is best set at the Cloudflare
    # edge. If you later serve TLS directly from this origin, uncomment:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    client_max_body_size 15m;

    # SSE stream — buffering off, long timeout
    location /api/calendar/stream {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Blog images — ^~ blocks regex matching, ensures proxy wins over static-file catch-all
    location ^~ /api/blog/images/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }

    # Login: strict rate limit (brute-force protection). Exact match wins
    # over the /api/ prefix below, so proxy directives are repeated here.
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Proxy API to backend
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # /docs (trailing slash 없음) → redirect
    location = /docs {
        return 301 /docs/;
    }

    # Docs site: ^~ 로 regex location(*.html) 보다 우선 처리
    location ^~ /docs/ {
        alias /usr/share/nginx/docs/;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # HTML: no-cache (항상 최신 index.html 로드 → 해시 변경된 JS/CSS 자동 반영)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # SPA fallback — index.html은 캐시 금지 (빌드 후 해시 변경 반영)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # weather-icons: 버전 해시 없는 정적 SVG → 짧은 캐시 (업데이트 반영)
    location /weather-icons/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets (JS/CSS는 파일명에 해시 포함 → 영구 캐시 가능)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ---------------------------------------------------------------------------
# TLS-ready scaffold (NOT enabled). Deployment model: Cloudflare terminates
# TLS at the edge for https://www.utlab.kr and proxies to this origin over
# http — so the block above (listen 80) is the live config and is correct
# as-is. The app already sees the real scheme via `X-Forwarded-Proto $scheme`
# and the original host via `X-Forwarded-Host`, set on every proxied location.
#
# Do NOT run certbot/Let's Encrypt for the Cloudflare-edge model. Only enable
# the block below if this origin must terminate TLS directly (e.g. a home
# server reachable without Cloudflare). To enable: provide cert/key files,
# uncomment, and (optionally) add an http->https redirect.
#
# server {
#     listen 443 ssl http2;
#     server_name www.utlab.kr utlab.kr;
#
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;   # mount real cert
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;     # mount real key
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#
#     # ... duplicate the location blocks from the :80 server above ...
# }
#
# Optional HTTP->HTTPS redirect (only for direct-TLS origin, NOT Cloudflare):
# server {
#     listen 80;
#     server_name www.utlab.kr utlab.kr;
#     return 301 https://$host$request_uri;
# }
# ---------------------------------------------------------------------------
